<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f1c17">
  <meta name="color-scheme" content="dark">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Spikegolf">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Spikegolf · GKBS</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="styles.css">
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three/three.module.min.js",
      "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.45.4?target=es2022&bundle"
    }
  }
  </script>
</head>
<body>
  <!-- 3D canvas is the hero, everything else floats over it -->
  <canvas id="stage"></canvas>
  <div id="grain" aria-hidden="true"></div>
  <div id="vignette" aria-hidden="true"></div>
  <!-- Soft dark shades so the top/bottom HUD strips have opaque
       backgrounds without hiding the map behind opaque bars. -->
  <div id="topShade" aria-hidden="true"></div>
  <div id="bottomShade" aria-hidden="true"></div>

  <!-- Loading screen while the terrain streams in -->
  <div id="boot">
    <div class="boot-inner">
      <div class="boot-mark">
        <svg viewBox="0 0 64 64" width="64" height="64" aria-hidden="true">
          <defs><clipPath id="bootClip"><circle cx="32" cy="32" r="25.5"/></clipPath></defs>
          <image href="icons/icon-512.png" x="6.5" y="6.5" width="51" height="51" clip-path="url(#bootClip)" preserveAspectRatio="xMidYMid slice"/>
          <circle cx="32" cy="32" r="30" fill="none" stroke="rgba(255,214,143,0.16)" stroke-width="1.5"/>
          <circle id="bootRing" cx="32" cy="32" r="30" fill="none" stroke="#ffb547" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="188.5" stroke-dashoffset="188.5" transform="rotate(-90 32 32)"/>
        </svg>
      </div>
      <div class="boot-title">SPIKEGOLF</div>
      <div class="boot-sub" id="bootSub">Alm wird geladen …</div>
      <div class="boot-bar"><i id="bootBar"></i></div>
    </div>
  </div>

  <div id="app">
    <!-- Minimalist HUD topbar -->
    <header class="hud-top">
      <div class="hud-brand">
        <span class="hud-dot"></span>
        <div class="hud-brand-text">
          <div class="hud-brand-title">Spikegolf</div>
          <div class="hud-brand-sub" id="brandSub">Obiralm · 46.5°N 14.4°E</div>
        </div>
      </div>
      <div class="hud-actions">
        <button class="hud-btn" id="camReset" aria-label="Kamera zurücksetzen">◎</button>
        <button class="hud-btn" id="menuBtn" aria-label="Menü">≡</button>
      </div>
    </header>

    <!-- Floating content panel -->
    <main id="view" class="hud-panel"><!-- views render here --></main>

    <!-- Radial tab strip -->
    <nav class="hud-nav">
      <button class="tab" data-tab="leaderboard">
        <span class="tab-ico">◆</span><span class="tab-lbl">Rang</span>
      </button>
      <button class="tab" data-tab="play">
        <span class="tab-ico">◉</span><span class="tab-lbl">Spielen</span>
      </button>
      <button class="tab" data-tab="map">
        <span class="tab-ico">✦</span><span class="tab-lbl">Karte</span>
      </button>
      <button class="tab" data-tab="courses">
        <span class="tab-ico">▲</span><span class="tab-lbl">Kurse</span>
      </button>
      <button class="tab" data-tab="players">
        <span class="tab-ico">◐</span><span class="tab-lbl">Team</span>
      </button>
    </nav>
  </div>

  <!-- Bottom-sheet modal (half-height so terrain stays visible) -->
  <div id="sheet" class="sheet" hidden>
    <div class="sheet-backdrop" data-close></div>
    <div class="sheet-card" role="dialog" aria-modal="true">
      <div class="sheet-handle" data-close></div>
      <div id="sheetBody"></div>
    </div>
  </div>

  <!-- Confetti canvas (used only for winner celebration) -->
  <canvas id="confetti" aria-hidden="true"></canvas>

  <!-- Toast -->
  <div id="toast" class="toast" hidden></div>

  <script type="module" src="app.js"></script>
</body>
</html>
